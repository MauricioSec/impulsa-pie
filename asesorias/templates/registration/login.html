<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión | Plataforma PIE</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen font-sans antialiased">
    
    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-sm border border-gray-200">
        <h2 class="text-2xl font-bold text-center text-slate-800 mb-6">Acceso a Plataforma</h2>
        
        {% if form.errors %}
            <p class="text-red-600 text-sm mb-4 text-center">Usuario o contraseña incorrectos. Intente nuevamente.</p>
        {% endif %}

        <form method="post" class="space-y-4">
            {% csrf_token %}
            {{ form.as_p }}
            
            <button type="submit" class="w-full bg-blue-800 text-white font-bold py-2 rounded-lg hover:bg-blue-700 transition-colors mt-4">
                Ingresar
            </button>

            <div class="mt-6 text-center text-sm border-t border-gray-100 pt-4">
                <p class="text-gray-600">¿No tienes una cuenta? <a href="{% url 'registro' %}" class="text-blue-600 font-medium hover:underline">Regístrate aquí</a></p>
            </div>

        </form>
        
        <div class="mt-6 text-center text-sm">
            <a href="{% url 'inicio' %}" class="text-blue-600 hover:underline">&larr; Volver al inicio</a>
        </div>
    </div>

</body>
</html>
